name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I try to... I expect... but instead...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create a SnowflakeSaver with...
        2. Call put() with...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproducible example
      description: Please provide a minimal code example that reproduces the issue.
      render: python
      placeholder: |
        from langgraph_checkpoint_snowflake import SnowflakeSaver

        with SnowflakeSaver.from_env() as saver:
            saver.setup()
            # Code that triggers the bug

  - type: textarea
    id: error
    attributes:
      label: Error message / Stack trace
      description: If applicable, paste the full error message or stack trace.
      render: shell

  - type: input
    id: version
    attributes:
      label: Package version
      description: What version of langgraph-checkpoint-snowflake are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: What version of Python are you using?
      placeholder: "3.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Additional environment details
      description: |
        Any other relevant environment details (Snowflake version, Redis version if using cache, etc.)
      placeholder: |
        - Snowflake warehouse size: X-Small
        - Redis version: 7.2 (if using Redis cache)
        - Running in Kubernetes: Yes/No

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
