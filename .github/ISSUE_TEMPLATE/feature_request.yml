name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if a feature request already exists.
      options:
        - label: I have searched the existing issues
          required: true

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature area
      description: What area of the library does this feature relate to?
      options:
        - Core (SnowflakeSaver)
        - Async (AsyncSnowflakeSaver)
        - Caching (LRU cache)
        - Redis/Valkey cache
        - Authentication
        - Performance
        - Testing
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like.
      placeholder: I would like to be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.

  - type: textarea
    id: code
    attributes:
      label: Example usage
      description: If applicable, show how you'd like to use this feature.
      render: python
      placeholder: |
        from langgraph_checkpoint_snowflake import SnowflakeSaver

        # How you'd like to use the new feature
        saver = SnowflakeSaver.from_env(new_option=True)

  - type: dropdown
    id: willingness
    attributes:
      label: Would you be willing to contribute this feature?
      options:
        - "Yes, I'd like to implement this"
        - "Yes, with guidance"
        - "No, but I can help test"
        - "No"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or references about the feature request.
